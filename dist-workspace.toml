[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "msi"]
# Homebrew + AUR publishing removed 2026-07-06 (secrets not configured). To
# re-enable Homebrew: add "homebrew" back to installers, restore `tap =
# "ZAAFHachemrachid/homebrew-tap"` and `publish-jobs = ["homebrew"]`, hand-
# restore the publish-homebrew-formula job in release.yml (allow-dirty=["ci"]
# means `dist generate` won't add it), and set the HOMEBREW_TAP_TOKEN secret.
# Target platforms to build apps for (Rust target-triple syntax)
# aarch64-pc-windows-msvc removed: cargo-dist cross-compiles it in a Linux
# container where WiX (MSI) is unavailable; Windows ARM runs the x64 build via
# emulation. Re-add with a native windows-11-arm runner mapping if needed.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# The release.yml tag glob is hand-narrowed to 'v[0-9]+...' so desktop-v* tags
# don't trigger cargo-dist; without this, 'dist host' fails the run with
# "out of date contents and needs to be regenerated".
allow-dirty = ["ci"]

# System dependencies needed for building (Tauri requires GTK on Linux).
# Scoped to Linux gnu targets: without the scope these also install inside the
# cargo-xwin container used for Windows ARM cross-compiles, where the generated
# apt command is non-interactive-unsafe and aborts at the [Y/n] prompt.
[dist.dependencies.apt]
"libgtk-3-dev" = { version = "*", targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"] }
"libwebkit2gtk-4.1-dev" = { version = "*", targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"] }
"libayatana-appindicator3-dev" = { version = "*", targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"] }
"librsvg2-dev" = { version = "*", targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"] }
"patchelf" = { version = "*", targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"] }
"libssl-dev" = { version = "*", targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"] }

