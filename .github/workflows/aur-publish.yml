name: Publish AUR Package

# Publishes projm-bin to the AUR after a CLI release (v* tag) is published.
# Requires secrets: AUR_SSH_PRIVATE_KEY (SSH key registered on the AUR account).
# The job is skipped silently until that secret is configured.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  aur-publish:
    if: startsWith(github.event.release.tag_name, 'v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check AUR secret
        id: gate
        run: |
          if [ -n "${{ secrets.AUR_SSH_PRIVATE_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::AUR_SSH_PRIVATE_KEY not set — skipping AUR publish"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD version and checksums
        if: steps.gate.outputs.enabled == 'true'
        working-directory: packaging/aur/projm-bin
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          fi
          BASE="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          SHA_X86=$(curl -sL "${BASE}/projm-x86_64-unknown-linux-gnu.tar.xz.sha256" | cut -d' ' -f1)
          SHA_ARM=$(curl -sL "${BASE}/projm-aarch64-unknown-linux-gnu.tar.xz.sha256" | cut -d' ' -f1)
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${SHA_X86}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${SHA_ARM}')/" PKGBUILD

      - name: Publish to AUR
        if: steps.gate.outputs.enabled == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: projm-bin
          pkgbuild: packaging/aur/projm-bin/PKGBUILD
          commit_username: ZAAFHachemrachid
          commit_email: hiri.elwannas@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.event.release.tag_name }}"
          updpkgsums: false
