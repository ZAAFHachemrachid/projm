name: Tauri Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.rust_target }}

      # src-tauri is a workspace member, so bundles land in the workspace-root
      # target/ directory, not src-tauri/target/.
      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-linux-${{ matrix.rust_target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-macos-${{ matrix.rust_target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-windows-${{ matrix.rust_target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: tauri-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Projm Desktop v${{ steps.version.outputs.version }}" \
            --notes "## Projm Desktop v${{ steps.version.outputs.version }}

          ### Downloads

          | Platform | File |
          |----------|------|
          | Linux (.deb) | Debian/Ubuntu package |
          | Linux (.AppImage) | Portable AppImage |
          | macOS (.dmg) | macOS disk image |
          | Windows (.msi) | Windows installer |
          | Windows (.exe) | Windows NSIS installer |

          ---
          *Built with [Tauri](https://tauri.app)*" \
            --generate-notes \
            $(find artifacts -type f)
