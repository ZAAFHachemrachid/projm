name: Tauri Desktop Release

on:
  push:
    tags:
      # Same glob as cargo-dist's release.yml: a single v* tag drives BOTH the
      # CLI release and this desktop build. The desktop bundles are uploaded
      # into the one cargo-dist-created GitHub release (see the upload step
      # below), so CLI + desktop ship as a single release instead of split
      # v*/desktop-v* tags.
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target ${{ matrix.rust_target }}

      # macOS updater archives are emitted as Projm.app.tar.gz on both arches;
      # rename them per-target so the merged artifact download doesn't collide.
      - name: Rename macOS updater artifacts
        if: runner.os == 'macOS'
        run: |
          dir="target/${{ matrix.rust_target }}/release/bundle/macos"
          mv "$dir/Projm.app.tar.gz" "$dir/Projm_${{ matrix.rust_target }}.app.tar.gz"
          mv "$dir/Projm.app.tar.gz.sig" "$dir/Projm_${{ matrix.rust_target }}.app.tar.gz.sig"

      # src-tauri is a workspace member, so bundles land in the workspace-root
      # target/ directory, not src-tauri/target/.
      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-linux-${{ matrix.rust_target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage.sig

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-macos-${{ matrix.rust_target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz
            target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: tauri-windows-${{ matrix.rust_target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            target/${{ matrix.rust_target }}/release/bundle/msi/*.msi.sig
            target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
            target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe.sig

  release:
    name: Upload desktop bundles to the release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: tauri-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate updater manifest (latest.json)
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          asset_for() {
            # $1 = glob pattern relative to artifacts/
            find artifacts -type f -name "$1" ! -name '*.sig' | head -n1
          }

          add_platform() {
            # $1 = platform key, $2 = artifact path
            local key="$1" file="$2"
            if [ -z "$file" ] || [ ! -f "${file}.sig" ]; then
              echo "::error::missing updater artifact or signature for ${key}"
              exit 1
            fi
            local name sig
            name="$(basename "$file")"
            sig="$(cat "${file}.sig")"
            jq --arg key "$key" --arg url "${BASE_URL}/${name}" --arg sig "$sig" \
              '.platforms[$key] = {signature: $sig, url: $url}' latest.json > latest.json.tmp
            mv latest.json.tmp latest.json
          }

          jq -n --arg version "$VERSION" --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version: $version, pub_date: $pub_date, platforms: {}}' > latest.json

          add_platform "linux-x86_64"   "$(asset_for '*.AppImage')"
          add_platform "darwin-aarch64" "$(asset_for 'Projm_aarch64-apple-darwin.app.tar.gz')"
          add_platform "darwin-x86_64"  "$(asset_for 'Projm_x86_64-apple-darwin.app.tar.gz')"
          add_platform "windows-x86_64" "$(asset_for '*-setup.exe')"

          cat latest.json

      - name: Upload desktop bundles into the cargo-dist release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          # release.yml (cargo-dist) runs in parallel on the same v* tag and
          # creates the GitHub release in its `host` job. Wait for that release
          # to exist, then upload the desktop bundles + updater manifest INTO it
          # so CLI and desktop ship as one release, not two.
          for i in $(seq 1 60); do
            if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
              echo "Release $TAG exists; uploading desktop assets."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Release $TAG was not created by cargo-dist within ~20 minutes; aborting desktop upload. (Did release.yml's build/host jobs fail?)"
              exit 1
            fi
            echo "Waiting for cargo-dist to create release $TAG (attempt $i/60)..."
            sleep 20
          done
          gh release upload "$TAG" --clobber --repo "${{ github.repository }}" \
            latest.json \
            $(find artifacts -type f)

      # The desktop app's updater endpoint points at the rolling desktop-latest
      # release, which always carries the newest latest.json. Kept separate from
      # the versioned v* release so the updater has one stable URL to poll.
      - name: Update rolling desktop-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view desktop-latest --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release upload desktop-latest latest.json --clobber --repo "${{ github.repository }}"
            gh release edit desktop-latest \
              --title "Desktop updater manifest" \
              --notes "Rolling release consumed by the Projm desktop auto-updater. Current version: v${{ steps.version.outputs.version }}. Download installers from the v* releases." \
              --repo "${{ github.repository }}"
          else
            gh release create desktop-latest latest.json \
              --title "Desktop updater manifest" \
              --notes "Rolling release consumed by the Projm desktop auto-updater. Current version: v${{ steps.version.outputs.version }}. Download installers from the v* releases." \
              --repo "${{ github.repository }}"
          fi
